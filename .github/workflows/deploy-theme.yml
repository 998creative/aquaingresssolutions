name: Deploy Theme To Live

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: live-theme-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.LIVE_SSH_HOST }}"
          test -n "${{ secrets.LIVE_SSH_USER }}"
          test -n "${{ secrets.LIVE_SSH_PRIVATE_KEY }}"
          test -n "${{ secrets.LIVE_THEME_PATH }}"

      - name: Configure SSH
        run: |
          set -eu
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          printf '%s\n' "${{ secrets.LIVE_SSH_PRIVATE_KEY }}" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          PORT="${{ secrets.LIVE_SSH_PORT }}"
          if [ -z "$PORT" ]; then PORT="22"; fi

          if [ -n "${{ secrets.LIVE_SSH_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.LIVE_SSH_KNOWN_HOSTS }}" > "$HOME/.ssh/known_hosts"
          else
            ssh-keyscan -p "$PORT" -H "${{ secrets.LIVE_SSH_HOST }}" >> "$HOME/.ssh/known_hosts"
          fi
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Deploy theme via rsync
        run: |
          set -eu
          PORT="${{ secrets.LIVE_SSH_PORT }}"
          if [ -z "$PORT" ]; then PORT="22"; fi

          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".DS_Store" \
            --exclude "*.zip" \
            --exclude "plugin/" \
            --exclude "README.md" \
            -e "ssh -p $PORT" \
            ./ "${{ secrets.LIVE_SSH_USER }}@${{ secrets.LIVE_SSH_HOST }}:${{ secrets.LIVE_THEME_PATH }}/"
